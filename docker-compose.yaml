services:
  # Serviço do Banco de Dados
  postgres-db:
    image: postgres:16-alpine
    container_name: fintech-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "9001:5432"

    deploy:
      resources:
        limits:
          cpu: '0.50'
          memory: '512M'
    
    volumes:
      - postgres_data:/var/lib/postgresql/data


  # Serviço da sua Aplicação Java
  api-fintech:
    build: .  # Constrói usando o Dockerfile da pasta atual
    container_name: fintech-app
    ports:
      - "9002:9002"
    depends_on:
      - postgres-db # Espera o banco iniciar
    environment:
      # Sobrescreve as configurações do application.properties para rodar no Docker
      - SPRING_DATASOURCE_URL=jdbc:${SPRING_URL}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
       

volumes:
  postgres_data: